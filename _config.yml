title: HTB Writeups
description: "The most comprehensive Hack The Box writeup collection - 500+ machines, 400+ challenges, ProLabs, Sherlocks, CTF events, cheatsheets, and OSCP/CPTS/CRTO certification prep."
url: "https://momenbasel.github.io"
baseurl: "/htb-writeups"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

logo: "/assets/images/logo.svg"

search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/
search.rel_url: true
search.button: true

heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/momenbasel/htb-writeups"

aux_links_new_tab: true

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

footer_content: 'Copyright &copy; 2026 <a href="https://github.com/momenbasel">Moamen Basel</a>. Distributed under the <a href="https://github.com/momenbasel/htb-writeups/blob/main/LICENSE">MIT License</a>.'

ga_tracking:
ga_tracking_anonymize_ip: true

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Exclude files from the site
exclude:
  - "0xdf-htb-machines.json"
  - "ippsec-video-index.json"
  - ".markdownlint.json"
  - "CONTRIBUTING.md"
  - "templates/"
  - "node_modules/"
  - "Gemfile"
  - "Gemfile.lock"

# Include dotfiles
include:
  - ".github"

# Collections for better organization
collections:
  machines:
    output: true
    permalink: /machines/:path/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "machines"
    values:
      layout: default
      parent: Machines
  - scope:
      path: "challenges"
    values:
      layout: default
      parent: Challenges
  - scope:
      path: "resources"
    values:
      layout: default
      parent: Resources
